<!--
  Deal Lookup Widget
  Searches Pipedrive "Demo - Sale" deals and auto-populates form fields on selection.

  SETTINGS:
    workerUrl (required) — Cloudflare Worker URL, e.g. https://pipedrive-field-proxy.your-account.workers.dev
    apiKey    (required) — API key for authenticating with the Worker (sent as Bearer token)

    labelMap (optional) — Override default field label matching. Only needed if your form
    uses different question text than the defaults below.

    addressFieldName (optional) — JotForm unique name of the Address composite field.
    Default: "InfoProjectAddress".

    phoneFieldName (optional) — JotForm unique name of the Phone composite field.
    Default: "InfoClientPhone".

    Default labels (set via setFieldsValueByLabel):
      projectId       = "Unique Project ID"
      clientName      = "Client Name"       (deal title → single text OR Full Name composite)
      clientFirstName = "Client Name"       (person first name → Full Name composite)
      clientLastName  = "Client Name"       (person last name → Full Name composite)
      location        = "Location"          (full address string → single text field)
      phone           = "Phone Number"
      date            = "Date"
      time            = "Time"
      salesRep        = "Primary Sales Rep"

    The widget sends both single-field and composite-field values simultaneously.
    JotForm will apply whichever ones match your form's field labels.
    For Client Name, setFieldsValueByLabel auto-splits into First/Last for Full Name
    composite fields, and sets the full title for single text fields.

    Example labelMap override: phone=Cell Phone,date=Appointment Date

  COMPOSITE ADDRESS FIELDS:
    Address sub-fields are populated via setFieldsValueById with an "items" property
    containing { addr_line1, city, state, postal }. The widget auto-discovers the
    Address field's QID via the JotForm REST API (no manual configuration needed).
    The "items" property bypasses the parent's generateCtrlItems() (which has no
    control_address case) and sends values directly to parse(), which does support it.
-->
<!DOCTYPE html>
<html>
<head>
    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 4px;
        }

        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .select-trigger {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 13px;
            background: #fff;
            cursor: text;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #333;
        }

        .select-trigger:focus-within {
            border-color: #497197;
            box-shadow: 0 0 0 3px rgba(73, 113, 151, 0.1);
        }

        .select-trigger input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 13px;
            background: transparent;
            color: #333;
            min-width: 0;
        }

        .select-trigger input::placeholder {
            color: #9ca3af;
        }

        .select-trigger .chevron {
            color: #64748b;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .select-trigger.open .chevron {
            transform: rotate(180deg);
        }

        .select-menu {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 50;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .select-menu.open {
            display: block;
        }

        .select-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            color: #333;
            transition: background-color 0.1s;
        }

        .select-item:hover,
        .select-item.highlighted {
            background: #eff6ff;
        }

        .select-item.selected {
            font-weight: 500;
        }

        .select-item .check {
            color: #497197;
            font-size: 14px;
            margin-left: 8px;
        }

        .select-item .deal-id {
            color: #64748b;
            font-size: 12px;
            margin-right: 6px;
            font-weight: 600;
        }

        .no-results {
            padding: 8px 12px;
            font-size: 13px;
            color: #9ca3af;
        }

        .loading {
            color: #999;
            font-size: 13px;
            padding: 8px 0;
        }

        .error {
            color: #dc2626;
            font-size: 12px;
            padding: 8px 0;
        }

        .populating {
            font-size: 12px;
            color: #497197;
            padding: 4px 0;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div class="loading" id="loading">Loading deals…</div>
        <div class="select-wrapper" id="selectWrapper" style="display:none">
            <div class="select-trigger" id="trigger">
                <input type="text" id="searchInput" placeholder="Type deal ID or client name…" autocomplete="off" />
                <svg class="chevron" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.25a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z" clip-rule="evenodd"/>
                </svg>
            </div>
            <div class="select-menu" id="menu"></div>
        </div>
        <div class="populating" id="populating" style="display:none">Populating fields…</div>
        <div class="error" id="errorMsg"></div>
    </div>

    <script>
        function getSetting(name, data) {
            try {
                var settingsStr = data.settings;
                if (settingsStr) {
                    var settings = JSON.parse(decodeURIComponent(settingsStr));
                    if (Array.isArray(settings)) {
                        for (var i = 0; i < settings.length; i++) {
                            if (settings[i].name === name) return settings[i].value;
                        }
                    }
                }
            } catch (e) { /* fall through */ }
            return JFCustomWidget.getWidgetSetting(name);
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('selectWrapper').style.display = 'none';
            document.getElementById('errorMsg').textContent = msg;
        }

        JFCustomWidget.subscribe("ready", function(data) {
            var workerUrl = getSetting('workerUrl', data);
            if (!workerUrl) {
                showError('Missing required setting: workerUrl');
                return;
            }
            workerUrl = workerUrl.replace(/\/+$/, '');

            var apiKey = getSetting('apiKey', data);
            if (!apiKey) {
                showError('Missing required setting: apiKey');
                return;
            }
            var authHeaders = { 'Authorization': 'Bearer ' + apiKey };

            // Default field labels — override via labelMap setting:
            // "projectId=Your Label,clientName=Other Label,..."
            var labels = {
                projectId:        'Unique Project ID',
                clientName:       'Client Name',
                clientFirstName:  'Client Name',
                clientLastName:   'Client Name',
                location:         'Location',
                phone:            'Phone Number',
                date:             'Date',
                time:             'Time',
                salesRep:         'Primary Sales Rep',
            };
            var labelMapStr = getSetting('labelMap', data);
            if (labelMapStr) {
                var lparts = labelMapStr.split(',');
                for (var i = 0; i < lparts.length; i++) {
                    var eq = lparts[i].indexOf('=');
                    if (eq > 0) {
                        var lk = lparts[i].substring(0, eq).trim();
                        var lv = lparts[i].substring(eq + 1).trim();
                        if (labels.hasOwnProperty(lk)) labels[lk] = lv;
                    }
                }
            }

            var allDeals = [];
            var selectedDeal = null;
            var highlightIndex = -1;

            var searchInput = document.getElementById('searchInput');
            var trigger = document.getElementById('trigger');
            var menu = document.getElementById('menu');
            var wrapper = document.getElementById('selectWrapper');

            // Fetch all Demo-Sale deals
            fetch(workerUrl + '/deals', { headers: authHeaders })
                .then(function(resp) {
                    if (!resp.ok) throw new Error('API returned ' + resp.status);
                    return resp.json();
                })
                .then(function(deals) {
                    allDeals = deals;
                    searchInput.placeholder = 'Search ' + deals.length + ' deals by ID or name…';
                    document.getElementById('loading').style.display = 'none';
                    wrapper.style.display = '';
                    JFCustomWidget.requestFrameResize({ height: 50 });
                })
                .catch(function(err) {
                    showError('Failed to load deals: ' + err.message);
                });

            function populateFields(fieldData) {
                var labelArray = [];
                for (var k in fieldData) {
                    if (fieldData[k] && labels[k]) {
                        labelArray.push({ label: labels[k], value: fieldData[k] });
                    }
                }
                if (labelArray.length > 0) {
                    JFCustomWidget.setFieldsValueByLabel(labelArray);
                }
            }

            // Discover QIDs for composite fields via JotForm REST API
            var compositeQIDs = {}; // { uniqueName: { qid, type } }
            var addressFieldName = getSetting('addressFieldName', data) || 'InfoProjectAddress';
            var phoneFieldName = getSetting('phoneFieldName', data) || 'InfoClientPhone';
            var formId = data.formID || '';

            if (formId) {
                fetch(workerUrl + '/jotform-fields/' + formId, { headers: authHeaders })
                    .then(function(resp) { return resp.json(); })
                    .then(function(fields) {
                        for (var name in fields) {
                            var f = fields[name];
                            if (f.type === 'control_address' || f.type === 'control_fullname' || f.type === 'control_phone') {
                                compositeQIDs[name] = { qid: f.qid, type: f.type };
                            }
                        }
                    })
                    .catch(function() {});
            }

            // Composite fields need "items" passed directly in the payload.
            // The parent's parse() supports them but generateCtrlItems() doesn't
            // handle address and may mangle phone formatting.
            function populateCompositeFields(deal) {
                var addr = compositeQIDs[addressFieldName];
                if (addr) {
                    var addrItems = {};
                    if (deal.streetAddress) addrItems.addr_line1 = deal.streetAddress;
                    if (deal.city) addrItems.city = deal.city;
                    if (deal.state) addrItems.state = deal.state;
                    if (deal.zip) addrItems.postal = deal.zip;
                    if (Object.keys(addrItems).length > 0) {
                        var fullAddr = [deal.streetAddress, deal.city, deal.state, deal.zip].filter(Boolean).join(', ');
                        JFCustomWidget.setFieldsValueById([
                            { id: String(addr.qid), value: fullAddr, items: addrItems }
                        ]);
                    }
                }

                var ph = compositeQIDs[phoneFieldName];
                if (ph && deal.phone) {
                    var phoneItems = { full: deal.phone };
                    if (deal.phoneArea) phoneItems.area = deal.phoneArea;
                    if (deal.phoneNumber) phoneItems.phone = deal.phoneNumber;
                    JFCustomWidget.setFieldsValueById([
                        { id: String(ph.qid), value: deal.phone, items: phoneItems }
                    ]);
                }
            }

            function filterDeals(query) {
                if (!query) return allDeals.slice(0, 50);
                var q = query.toLowerCase();
                return allDeals.filter(function(d) {
                    return String(d.id).includes(q) || d.title.toLowerCase().includes(q);
                }).slice(0, 50);
            }

            function renderMenu(deals) {
                menu.innerHTML = '';
                highlightIndex = -1;
                if (deals.length === 0) {
                    var noRes = document.createElement('div');
                    noRes.className = 'no-results';
                    noRes.textContent = 'No matching deals';
                    menu.appendChild(noRes);
                    return;
                }
                for (var i = 0; i < deals.length; i++) {
                    var item = document.createElement('div');
                    item.className = 'select-item';
                    if (selectedDeal && deals[i].id === selectedDeal.id) {
                        item.className += ' selected';
                    }
                    item.setAttribute('data-index', i);
                    item.setAttribute('data-id', deals[i].id);
                    var idSpan = '<span class="deal-id">' + deals[i].id + '</span>';
                    var titleSpan = '<span>' + deals[i].title + '</span>';
                    var checkSpan = (selectedDeal && deals[i].id === selectedDeal.id) ? '<span class="check">✓</span>' : '';
                    item.innerHTML = '<span>' + idSpan + titleSpan + '</span>' + checkSpan;
                    menu.appendChild(item);
                }
            }

            function openMenu() {
                var deals = filterDeals(searchInput.value);
                renderMenu(deals);
                menu.classList.add('open');
                trigger.classList.add('open');
                var totalH = wrapper.offsetHeight + Math.min(menu.scrollHeight, 300) + 20;
                JFCustomWidget.requestFrameResize({ height: totalH });
            }

            function closeMenu() {
                menu.classList.remove('open');
                trigger.classList.remove('open');
                if (selectedDeal) {
                    searchInput.value = selectedDeal.id + ' - ' + selectedDeal.title;
                }
                JFCustomWidget.requestFrameResize({ height: 50 });
            }

            function selectDeal(deal) {
                selectedDeal = deal;
                searchInput.value = deal.id + ' - ' + deal.title;
                closeMenu();

                populateFields({
                    projectId:        String(deal.id),
                    clientName:       deal.title,
                    clientFirstName:  deal.personFirstName,
                    clientLastName:   deal.personLastName,
                    location:         deal.address,
                    phone:            deal.phone,
                    // salesRep comes from activity assignedTo, not deal
                });

                populateCompositeFields(deal);

                JFCustomWidget.sendData({ valid: true, value: String(deal.id) });

                // Fetch activity for date/time
                var popEl = document.getElementById('populating');
                popEl.style.display = '';
                fetch(workerUrl + '/deals/' + deal.id + '/activity', { headers: authHeaders })
                    .then(function(resp) { return resp.json(); })
                    .then(function(activity) {
                        populateFields({
                            date: activity.due_date,
                            time: activity.due_time,
                            salesRep: activity.assignedTo,
                        });
                        popEl.style.display = 'none';
                    })
                    .catch(function() {
                        popEl.style.display = 'none';
                    });
            }

            // On focus: clear input text so user can search fresh, show full list
            searchInput.addEventListener('focus', function() {
                searchInput.value = '';
                openMenu();
            });

            searchInput.addEventListener('input', function() {
                openMenu();
            });

            searchInput.addEventListener('keydown', function(e) {
                var items = menu.querySelectorAll('.select-item');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
                    updateHighlight(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    highlightIndex = Math.max(highlightIndex - 1, 0);
                    updateHighlight(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (highlightIndex >= 0 && highlightIndex < items.length) {
                        var dealId = parseInt(items[highlightIndex].getAttribute('data-id'));
                        var deal = allDeals.find(function(d) { return d.id === dealId; });
                        if (deal) selectDeal(deal);
                    }
                } else if (e.key === 'Escape') {
                    closeMenu();
                    searchInput.blur();
                }
            });

            function updateHighlight(items) {
                for (var i = 0; i < items.length; i++) {
                    items[i].classList.toggle('highlighted', i === highlightIndex);
                }
                if (items[highlightIndex]) {
                    items[highlightIndex].scrollIntoView({ block: 'nearest' });
                }
            }

            // Click to select
            menu.addEventListener('click', function(e) {
                var item = e.target.closest('.select-item');
                if (!item) return;
                var dealId = parseInt(item.getAttribute('data-id'));
                var deal = allDeals.find(function(d) { return d.id === dealId; });
                if (deal) selectDeal(deal);
            });

            // Close on outside click
            document.addEventListener('click', function(e) {
                if (!wrapper.contains(e.target)) {
                    closeMenu();
                }
            });

            // Close when iframe loses focus (user clicked outside the iframe)
            window.addEventListener('blur', function() {
                setTimeout(closeMenu, 100);
            });

            // Submit handler
            JFCustomWidget.subscribe("submit", function() {
                JFCustomWidget.sendSubmit({
                    valid: selectedDeal !== null,
                    value: selectedDeal ? String(selectedDeal.id) : ''
                });
            });
        });
    </script>
</body>
</html>
